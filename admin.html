<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面｜パチレン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900" x-data="adminApp()" x-cloak style="display: none;">
    <!-- ヘッダー -->
    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="flex items-center space-x-2">
                        <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-orange-500 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-lg">P</span>
                        </div>
                        <span class="text-xl font-bold text-gray-900">パチレン</span>
                    </a>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600 font-semibold">管理画面</span>
                </div>
                <a href="index.html" class="text-gray-600 hover:text-red-600 transition">
                    サイトに戻る →
                </a>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row gap-8">
            <!-- サイドバー -->
            <div class="w-full md:w-72">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-lg font-bold mb-4">メニュー</h2>
                    <nav class="space-y-2">
                        <button @click="activeTab = 'products'" :class="activeTab === 'products' ? 'bg-red-500 text-white' : 'text-gray-700 hover:bg-gray-100'" class="w-full px-4 py-3 rounded-lg text-left font-medium transition flex items-center justify-between">
                            <span>商品管理</span>
                            <span x-text="products.length" class="px-2 py-1 bg-white/20 rounded-full text-sm"></span>
                        </button>
                        <button @click="activeTab = 'add'" :class="activeTab === 'add' ? 'bg-red-500 text-white' : 'text-gray-700 hover:bg-gray-100'" class="w-full px-4 py-3 rounded-lg text-left font-medium transition">
                            商品を追加
                        </button>
                        <button @click="activeTab = 'notices'" :class="activeTab === 'notices' ? 'bg-red-500 text-white' : 'text-gray-700 hover:bg-gray-100'" class="w-full px-4 py-3 rounded-lg text-left font-medium transition">
                            お知らせ管理
                        </button>
                        <button @click="activeTab = 'rentals'" :class="activeTab === 'rentals' ? 'bg-red-500 text-white' : 'text-gray-700 hover:bg-gray-100'" class="w-full px-4 py-3 rounded-lg text-left font-medium transition">
                            貸出管理
                        </button>
                        <div class="border-t border-gray-200 pt-4 mt-4">
                            <h3 class="text-sm font-bold text-gray-500 mb-3">統計ダッシュボード</h3>
                            <div class="space-y-3">
                                <div class="bg-red-50 rounded-lg p-3">
                                    <div class="text-xs text-gray-500 mb-1">総貸出数（月間）</div>
                                    <div x-text="monthlyRentalCount" class="text-2xl font-bold text-red-600"></div>
                                </div>
                                <div class="bg-green-50 rounded-lg p-3">
                                    <div class="text-xs text-gray-500 mb-1">返済済み</div>
                                    <div x-text="repaidCount" class="text-2xl font-bold text-green-600"></div>
                                </div>
                                <div class="bg-orange-50 rounded-lg p-3">
                                    <div class="text-xs text-gray-500 mb-1">貸出中</div>
                                    <div x-text="activeRentalCount" class="text-2xl font-bold text-orange-600"></div>
                                </div>
                                <div class="bg-purple-50 rounded-lg p-3">
                                    <div class="text-xs text-gray-500 mb-1">総売上（月間）</div>
                                    <div x-text="formatPrice(monthlyRevenue)" class="text-2xl font-bold text-purple-600"></div>
                                </div>
                            </div>
                        </div>
                        <div class="border-t border-gray-200 pt-4 mt-4">
                            <h3 class="text-sm font-bold text-gray-500 mb-3">データ管理</h3>
                            <div class="space-y-2">
                                <button @click="backupData" class="w-full px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition text-left">
                                    📦 データのバックアップ
                                </button>
                                <button @click="importData" class="w-full px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition text-left">
                                    📤 データのインポート
                                </button>
                                <button @click="clearAllData" class="w-full px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition text-left">
                                    🗑️ データのリセット
                                </button>
                            </div>
                        </div>
                    </nav>
                </div>
            </div>

            <!-- メインエリア -->
            <div class="flex-1">
                <!-- 商品一覧 -->
                <div x-show="activeTab === 'products'" x-transition>
                    <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-6">
                            <h2 class="text-2xl font-bold">商品一覧</h2>
                            <div class="flex items-center gap-3 flex-wrap">
                                <input type="text" x-model="searchQuery" placeholder="商品名で検索..." class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                <select x-model="filterStatus" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                    <option value="all">すべて</option>
                                    <option value="available">在庫あり</option>
                                    <option value="rented">貸出中</option>
                                </select>
                                <select x-model="filterType" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                    <option value="all">すべて</option>
                                    <option value="pachislot">パチスロ</option>
                                    <option value="pachinko">パチンコ</option>
                                </select>
                            </div>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-gray-200">
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">商品名</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">区分</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">価格</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">カテゴリ</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">ステータス</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="product in filteredProducts" :key="product.id">
                                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                            <td class="py-3 px-4">
                                                <div class="flex items-center gap-3">
                                                    <img :src="product.image" :alt="product.name" class="w-16 h-12 object-cover rounded">
                                                    <div>
                                                        <div x-text="product.name" class="font-semibold"></div>
                                                        <div x-text="product.description" class="text-sm text-gray-500"></div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="py-3 px-4">
                                                <span x-text="getTypeLabel(product.type)" class="px-2 py-1 rounded text-sm font-medium" :class="getTypeClass(product.type)"></span>
                                            </td>
                                            <td class="py-3 px-4">
                                                <span x-text="formatPrice(product.price)" class="font-bold text-red-600"></span>
                                                <span class="text-gray-500 text-sm">/月</span>
                                            </td>
                                            <td class="py-3 px-4">
                                                <span x-text="getCategoryLabel(product.category)" class="px-3 py-1 rounded-full text-sm" :class="getCategoryClass(product.category)"></span>
                                            </td>
                                            <td class="py-3 px-4">
                                                <span x-text="getStatusLabel(product.rented)" class="px-3 py-1 rounded-full text-sm" :class="getStatusClass(product.rented)"></span>
                                            </td>
                                            <td class="py-3 px-4">
                                                <div class="flex items-center gap-2">
                                                    <button @click="toggleRentalStatus(product)" class="p-2 text-orange-600 hover:bg-orange-50 rounded-lg transition" title="貸出状況を変更">
                                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                                                        </svg>
                                                    </button>
                                                    <button @click="editProduct(product)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition" title="編集">
                                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                                        </svg>
                                                    </button>
                                                    <button @click="deleteProduct(product.id)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition" title="削除">
                                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 商品追加・編集 -->
                <div x-show="activeTab === 'add' || activeTab === 'edit'" x-transition>
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h2 class="text-2xl font-bold mb-6" x-text="activeTab === 'edit' ? '商品を編集' : '商品を追加'"></h2>
                        <form @submit.prevent="saveProduct" class="space-y-6">
                            <div class="grid md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">商品名 <span class="text-red-500">*</span></label>
                                    <input type="text" x-model="formData.name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">価格 <span class="text-red-500">*</span></label>
                                    <div class="relative">
                                        <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500">¥</span>
                                        <input type="number" x-model="formData.price" required min="0" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                        <span class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500">/月</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">説明文</label>
                                <textarea x-model="formData.description" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="商品の特徴や詳細を入力"></textarea>
                            </div>

                            <div class="grid md:grid-cols-3 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">区分 <span class="text-red-500">*</span></label>
                                    <select x-model="formData.type" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                        <option value="pachislot">パチスロ</option>
                                        <option value="pachinko">パチンコ</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">カテゴリ</label>
                                    <select x-model="formData.category" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                        <option value="new">新着</option>
                                        <option value="popular">人気</option>
                                        <option value="classic">定番</option>
                                        <option value="featured">注目</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">ステータス</label>
                                    <div class="flex items-center space-x-4 mt-3">
                                        <label class="flex items-center">
                                            <input type="radio" x-model="formData.rented" :value="false" class="mr-2">
                                            <span>在庫あり</span>
                                        </label>
                                        <label class="flex items-center">
                                            <input type="radio" x-model="formData.rented" :value="true" class="mr-2">
                                            <span>貸出中</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- 画像アップロード -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">商品画像 <span class="text-red-500">*</span></label>
                                <div
                                    x-ref="dropZone"
                                    class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-red-500 transition cursor-pointer relative"
                                    :class="{ 'border-red-500 bg-red-50': isDragging }"
                                    @dragover.prevent="isDragging = true"
                                    @dragleave.prevent="isDragging = false"
                                    @drop.prevent="handleDrop"
                                    @click="$refs.imageInput.click()"
                                >
                                    <input type="file" x-ref="imageInput" accept="image/*" @change="handleImageUpload" class="hidden">
                                    <div x-show="!previewImage" class="space-y-3">
                                        <svg class="w-12 h-12 mx-auto text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                        </svg>
                                        <p class="text-gray-600">クリックして画像を選択 または ドラッグ＆ドロップ</p>
                                        <p class="text-sm text-gray-400">PNG, JPG, GIF (最大 5MB)</p>
                                    </div>
                                    <div x-show="previewImage" class="space-y-3">
                                        <img :src="previewImage" alt="プレビュー" class="w-48 h-36 object-cover rounded-lg mx-auto">
                                        <button type="button" @click.stop="removeImage" class="text-red-600 hover:text-red-700 text-sm">
                                            画像を削除
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-4">
                                <button type="submit" class="btn-primary px-8 py-3 rounded-lg text-white font-bold">
                                    <span x-text="activeTab === 'edit' ? '更新する' : '追加する'"></span>
                                </button>
                                <button type="button" @click="cancelEdit" class="px-8 py-3 rounded-lg bg-gray-200 text-gray-700 font-bold hover:bg-gray-300 transition">
                                    キャンセル
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- お知らせ管理 -->
                <div x-show="activeTab === 'notices'" x-transition>
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-6">
                            <h2 class="text-2xl font-bold">お知らせ管理</h2>
                            <button @click="showNoticeForm = true" class="btn-primary px-4 py-2 rounded-lg text-white font-bold">
                                + お知らせを追加
                            </button>
                        </div>

                        <!-- お知らせ追加フォーム -->
                        <div x-show="showNoticeForm" x-transition class="bg-gray-50 rounded-lg p-6 mb-6">
                            <h3 class="text-lg font-bold mb-4">お知らせ追加</h3>
                            <form @submit.prevent="addNotice" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">タイトル <span class="text-red-500">*</span></label>
                                    <input type="text" x-model="noticeForm.title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">内容 <span class="text-red-500">*</span></label>
                                    <textarea x-model="noticeForm.content" rows="4" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"></textarea>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">重要度</label>
                                    <select x-model="noticeForm.priority" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                        <option value="normal">通常</option>
                                        <option value="important">重要</option>
                                        <option value="urgent">緊急</option>
                                    </select>
                                </div>
                                <div class="flex gap-4">
                                    <button type="submit" class="btn-primary px-4 py-2 rounded-lg text-white font-bold">追加する</button>
                                    <button type="button" @click="showNoticeForm = false" class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold hover:bg-gray-300 transition">キャンセル</button>
                                </div>
                            </form>
                        </div>

                        <!-- お知らせ一覧 -->
                        <div class="space-y-4">
                            <template x-for="(notice, index) in notices" :key="notice.id">
                                <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition">
                                    <div class="flex items-start justify-between gap-4">
                                        <div class="flex-1">
                                            <div class="flex items-center gap-3 mb-2">
                                                <h4 class="font-bold text-lg" x-text="notice.title"></h4>
                                                <span :class="getPriorityClass(notice.priority)" class="px-2 py-1 rounded text-xs font-medium">
                                                    <span x-text="getPriorityLabel(notice.priority)"></span>
                                                </span>
                                                <span class="text-sm text-gray-400" x-text="formatDate(notice.createdAt)"></span>
                                            </div>
                                            <p x-text="notice.content" class="text-gray-600"></p>
                                        </div>
                                        <div class="flex gap-2">
                                            <button @click="editNotice(index)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition" title="編集">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                                </svg>
                                            </button>
                                            <button @click="deleteNotice(index)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition" title="削除">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- 貸出管理 -->
                <div x-show="activeTab === 'rentals'" x-transition>
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-6">
                            <h2 class="text-2xl font-bold">貸出管理</h2>
                            <div class="flex items-center gap-3">
                                <select x-model="rentalFilterStatus" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                    <option value="all">すべて</option>
                                    <option value="active">貸出中</option>
                                    <option value="returned">返済済み</option>
                                </select>
                            </div>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-gray-200">
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">ユーザー</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">商品名</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">貸出日</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">返却予定日</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">状態</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="rental in filteredRentals" :key="rental.id">
                                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                            <td class="py-3 px-4">
                                                <div>
                                                    <div x-text="rental.userName" class="font-semibold"></div>
                                                    <div x-text="rental.userId" class="text-sm text-gray-500"></div>
                                                </div>
                                            </td>
                                            <td class="py-3 px-4" x-text="rental.productName"></td>
                                            <td class="py-3 px-4" x-text="formatDate(rental.rentalDate)"></td>
                                            <td class="py-3 px-4" x-text="formatDate(rental.returnDate)"></td>
                                            <td class="py-3 px-4">
                                                <span x-text="getRentalStatusLabel(rental.status)" class="px-3 py-1 rounded-full text-sm" :class="getRentalStatusClass(rental.status)"></span>
                                            </td>
                                            <td class="py-3 px-4">
                                                <button @click="markAsReturned(rental.id)" class="px-3 py-1 rounded-lg text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition">
                                                    返却済みにする
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 確認モーダル -->
    <div x-show="showDeleteModal" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-4">削除の確認</h3>
            <p class="text-gray-600 mb-6">この商品を削除してもよろしいですか？この操作は取り消せません。</p>
            <div class="flex gap-4">
                <button @click="confirmDelete" class="btn-primary px-6 py-3 rounded-lg text-white font-bold flex-1">
                    削除する
                </button>
                <button @click="showDeleteModal = false" class="px-6 py-3 rounded-lg bg-gray-200 text-gray-700 font-bold flex-1 hover:bg-gray-300 transition">
                    キャンセル
                </button>
            </div>
        </div>
    </div>

    <!-- トースト通知 -->
    <div x-show="showToast" x-cloak x-transition class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl z-50">
        <span x-text="toastMessage"></span>
    </div>

    <script>
        function adminApp() {
            return {
                activeTab: 'products',
                searchQuery: '',
                filterStatus: 'all',
                filterType: 'all',
                showDeleteModal: false,
                showToast: false,
                toastMessage: '',
                deleteTargetId: null,
                previewImage: null,
                showNoticeForm: false,
                noticeForm: { title: '', content: '', priority: 'normal' },
                rentalFilterStatus: 'all',
                rentals: [],
                notices: [],
                isDragging: false,

                formData: {
                    id: null,
                    name: '',
                    price: '',
                    description: '',
                    type: 'pachislot',
                    category: 'new',
                    rented: false,
                    image: null
                },
                products: [],

                init() {
                    this.loadProducts();
                    this.loadRentals();
                    this.loadNotices();
                },

                get filteredProducts() {
                    return this.products.filter(product => {
                        const matchesSearch = product.name.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                                          product.description.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchesStatus = this.filterStatus === 'all' ||
                                           (this.filterStatus === 'available' && !product.rented) ||
                                           (this.filterStatus === 'rented' && product.rented);
                        const matchesType = this.filterType === 'all' ||
                                          product.type === this.filterType;
                        return matchesSearch && matchesStatus && matchesType;
                    });
                },

                get filteredRentals() {
                    return this.rentals.filter(rental => {
                        if (this.rentalFilterStatus === 'all') return true;
                        return rental.status === this.rentalFilterStatus;
                    });
                },

                // 統計情報
                get monthlyRentalCount() {
                    return this.rentals.filter(r => {
                        const date = new Date(r.rentalDate);
                        return date.getMonth() === new Date().getMonth() &&
                               date.getFullYear() === new Date().getFullYear();
                    }).length;
                },

                get repaidCount() {
                    return this.rentals.filter(r => r.status === 'returned').length;
                },

                get activeRentalCount() {
                    return this.rentals.filter(r => r.status === 'active').length;
                },

                get monthlyRevenue() {
                    return this.rentals
                        .filter(r => r.status === 'returned')
                        .reduce((sum, r) => sum + r.price, 0);
                },

                // 画像アップロード
                handleImageUpload(event) {
                    const file = event.target.files[0];
                    if (file) {
                        this.compressAndProcessImage(file);
                    }
                },

                // ドラッグ＆ドロップ処理
                handleDrop(event) {
                    this.isDragging = false;
                    const files = event.dataTransfer.files;
                    if (files.length > 0) {
                        const file = files[0];
                        if (file.type.startsWith('image/')) {
                            this.compressAndProcessImage(file);
                        } else {
                            alert('画像ファイルのみを選択してください');
                        }
                    }
                },

                // 画像を圧縮して処理
                async compressAndProcessImage(file) {
                    try {
                        // ファイルサイズチェック（5MB制限）
                        if (file.size > 5 * 1024 * 1024) {
                            alert('ファイルサイズは5MB以内にしてください');
                            return;
                        }

                        // 画像を読み込む
                        const img = new Image();
                        img.onload = () => {
                            // 圧縮処理
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');

                            // 最大幅を800pxに制限
                            const maxWidth = 800;
                            const maxHeight = 800;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > maxWidth) {
                                    height = (height * maxWidth) / width;
                                    width = maxWidth;
                                }
                            } else {
                                if (height > maxHeight) {
                                    width = (width * maxHeight) / height;
                                    height = maxHeight;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;

                            // 背景を白に設定
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);

                            // 画像を描画
                            ctx.drawImage(img, 0, 0, width, height);

                            // 圧縮して保存
                            const quality = 0.7; // 圧縮率 70%
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);

                            // Base64データのサイズチェック
                            const base64Length = Math.round(compressedDataUrl.length * (3 / 4));
                            if (base64Length > 4 * 1024 * 1024) { // 4MB制限
                                alert('画像が大きすぎます。より小さい画像を選択してください。');
                                return;
                            }

                            this.previewImage = compressedDataUrl;
                            this.showToastMessage('画像を圧縮しました');
                        };

                        img.onerror = () => {
                            alert('画像の読み込みに失敗しました');
                        };

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);

                    } catch (error) {
                        console.error('画像処理エラー:', error);
                        alert('画像処理中にエラーが発生しました');
                    }
                },

                removeImage() {
                    this.previewImage = null;
                    this.formData.image = null;
                    if (this.$refs.imageInput) {
                        this.$refs.imageInput.value = '';
                    }
                },

                // 商品操作
                loadProducts() {
                    const saved = localStorage.getItem('pachiren_products');
                    if (saved) {
                        this.products = JSON.parse(saved);
                    } else {

                        this.products = [
                            {

                                image: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=300&fit=crop'
                            },
                            {
                                id: 6,

                                type: 'pachislot',
                                category: 'classic',

                                image: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=300&fit=crop'
                            },
                            {

                                name: '押忍！番長',
                                description: '3【5号機】',
                                price: 4500,
                                type: 'pachislot',
                                category: 'popular',
                                rented: false,
                                image: 'https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=400&h=300&fit=crop'
                            },
                            {
                                id: 8,
                                name: 'スマスロ 北斗の拳',
                                description: '転生の章',
                                price: 5500,
                                type: 'pachislot',
                                category: 'new',
                                rented: true,
                                image: 'https://images.unsplash.com/photo-1560419015-7c427e8ae5ba?w=400&h=300&fit=crop'
                            }
                        ];
                        this.saveProducts();
                    }
                },

                saveProducts() {
                    localStorage.setItem('pachiren_products', JSON.stringify(this.products));
                },

                saveProduct() {
                    if (this.activeTab === 'edit') {
                        const index = this.products.findIndex(p => p.id === this.formData.id);
                        if (index !== -1) {
                            // 画像が変更されている場合は新しい画像を使用
                            const isNewImage = this.previewImage !== null && this.previewImage !== this.products[index].image;
                            const productWithImage = isNewImage
                                ? { ...this.formData, image: this.previewImage }
                                : { ...this.formData, image: this.products[index].image };

                            this.products[index] = productWithImage;
                            const message = isNewImage ? '商品を更新しました（画像を変更）' : '商品を更新しました';
                            this.showToastMessage(message);
                        }
                    } else {
                        // 画像がある場合のみ保存
                        if (!this.previewImage) {
                            alert('画像を設定してください');
                            return;
                        }

                        const newProduct = {
                            ...this.formData,
                            id: Date.now(),
                            image: this.previewImage
                        };
                        this.products.push(newProduct);
                        this.showToastMessage('商品を追加しました');
                    }
                    this.saveProducts();
                    this.cancelEdit();
                },

                editProduct(product) {
                    this.formData = {
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        description: product.description,
                        type: product.type,
                        category: product.category,
                        rented: product.rented,
                        image: null
                    };
                    // 画像がある場合は読み込む
                    if (product.image) {
                        this.previewImage = product.image;
                    } else {
                        this.previewImage = null;
                    }
                    this.activeTab = 'edit';
                },

                deleteProduct(id) {
                    this.deleteTargetId = id;
                    this.showDeleteModal = true;
                },

                confirmDelete() {
                    this.products = this.products.filter(p => p.id !== this.deleteTargetId);
                    this.saveProducts();
                    this.showDeleteModal = false;
                    this.deleteTargetId = null;
                    this.showToastMessage('商品を削除しました');
                },

                toggleRentalStatus(product) {
                    product.rented = !product.rented;
                    this.saveProducts();
                    this.showToastMessage(product.rented ? '貸出中に変更しました' : '在庫ありに変更しました');
                },

                cancelEdit() {
                    this.activeTab = 'products';
                    this.formData = {
                        id: null,
                        name: '',
                        price: '',
                        description: '',
                        type: 'pachislot',
                        category: 'new',
                        rented: false,
                        image: null
                    };
                    this.previewImage = null;
                    // input要素をリセット
                    if (this.$refs.imageInput) {
                        this.$refs.imageInput.value = '';
                    }
                },

                // 貸出管理
                loadRentals() {
                    const saved = localStorage.getItem('pachiren_rentals');
                    if (saved) {
                        this.rentals = JSON.parse(saved);
                    } else {
                        // デフォルト貸出データ
                        this.rentals = [
                            {
                                id: 1,
                                userId: 'user001',
                                userName: '田中太郎',
                                productId: 3,
                                productName: 'モンスターハンター',
                                price: 5500,
                                rentalDate: '2026-03-10',
                                returnDate: '2026-03-20',
                                status: 'active'
                            },
                            {
                                id: 2,
                                userId: 'user002',
                                userName: '佐藤花子',
                                productId: 8,
                                productName: 'スマスロ 北斗の拳',
                                price: 5500,
                                rentalDate: '2026-03-12',
                                returnDate: '2026-03-22',
                                status: 'returned'
                            },
                            {
                                id: 3,
                                userId: 'user003',
                                userName: '鈴木一郎',
                                productId: 4,
                                productName: 'ANEMONE',
                                price: 5500,
                                rentalDate: '2026-03-14',
                                returnDate: '2026-03-24',
                                status: 'active'
                            }
                        ];
                        this.saveRentals();
                    }
                },

                saveRentals() {
                    localStorage.setItem('pachiren_rentals', JSON.stringify(this.rentals));
                },

                markAsReturned(id) {
                    const rental = this.rentals.find(r => r.id === id);
                    if (rental) {
                        rental.status = 'returned';
                        this.saveRentals();
                        this.showToastMessage('貸出を返却済みにしました');
                    }
                },

                // お知らせ管理
                loadNotices() {
                    const saved = localStorage.getItem('pachiren_notices');
                    if (saved) {
                        this.notices = JSON.parse(saved);
                    } else {
                        // デフォルトお知らせ
                        this.notices = [
                            {
                                id: 1,
                                title: 'サイトメンテナンスのお知らせ',
                                content: '2026年3月20日からサイトメンテナンスを実施いたします。お客様には多大なるご不便をおかけいたしますが、何卒ご理解のほどお願い申し上げます。',
                                priority: 'important',
                                createdAt: new Date('2026-03-15').toISOString()
                            },
                            {
                                id: 2,
                                title: '新商品のご案内',
                                content: 'ついに『忍魂参』が登場しました！最新のテクノロジーを搭載したスマスロが今、あなたを待っています。',
                                priority: 'normal',
                                createdAt: new Date('2026-03-10').toISOString()
                            }
                        ];
                        this.saveNotices();
                    }
                },

                saveNotices() {
                    localStorage.setItem('pachiren_notices', JSON.stringify(this.notices));
                },

                addNotice() {
                    this.notices.unshift({
                        id: Date.now(),
                        title: this.noticeForm.title,
                        content: this.noticeForm.content,
                        priority: this.noticeForm.priority,
                        createdAt: new Date().toISOString()
                    });
                    this.saveNotices();
                    this.noticeForm = { title: '', content: '', priority: 'normal' };
                    this.showNoticeForm = false;
                    this.showToastMessage('お知らせを追加しました');
                },

                editNotice(index) {
                    const notice = this.notices[index];
                    this.noticeForm = {
                        title: notice.title,
                        content: notice.content,
                        priority: notice.priority
                    };
                    this.notices.splice(index, 1);
                    this.showNoticeForm = true;
                },

                deleteNotice(index) {
                    this.notices.splice(index, 1);
                    this.saveNotices();
                    this.showToastMessage('お知らせを削除しました');
                },

                // データ管理
                backupData() {
                    const data = {
                        products: this.products,
                        rentals: this.rentals,
                        notices: this.notices,
                        backupDate: new Date().toISOString()
                    };

                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `pachiren_backup_${new Date().toISOString().split('T')[0]}.json`;
                    a.click();
                    URL.revokeObjectURL(url);

                    this.showToastMessage('データをバックアップしました');
                },

                importData() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'application/json';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                if (data.products) this.products = data.products;
                                if (data.rentals) this.rentals = data.rentals;
                                if (data.notices) this.notices = data.notices;
                                this.saveProducts();
                                this.saveRentals();
                                this.saveNotices();
                                this.showToastMessage('データをインポートしました');
                            } catch (error) {
                                alert('ファイルの読み込みに失敗しました');
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                },

                clearAllData() {
                    if (confirm('すべてのデータをリセットしますか？この操作は取り消せません。')) {
                        this.products = [];
                        this.rentals = [];
                        this.notices = [];
                        localStorage.removeItem('pachiren_products');
                        localStorage.removeItem('pachiren_rentals');
                        localStorage.removeItem('pachiren_notices');
                        this.showToastMessage('すべてのデータをリセットしました');
                    }
                },

                // ユーティリティ
                showToastMessage(message) {
                    this.toastMessage = message;
                    this.showToast = true;
                    setTimeout(() => {
                        this.showToast = false;
                    }, 3000);
                },

                formatPrice(price) {
                    return new Intl.NumberFormat('ja-JP').format(price);
                },

                formatDate(dateString) {
                    const date = new Date(dateString);
                    return date.toLocaleDateString('ja-JP');
                },

                // 区分のラベル・クラス
                getTypeLabel(type) {
                    const labels = {
                        pachislot: 'パチスロ',
                        pachinko: 'パチンコ'
                    };
                    return labels[type] || type;
                },

                getTypeClass(type) {
                    const classes = {
                        pachislot: 'bg-blue-100 text-blue-700',
                        pachinko: 'bg-pink-100 text-pink-700'
                    };
                    return classes[type] || 'bg-gray-100 text-gray-700';
                },

                getCategoryLabel(category) {
                    const labels = {
                        new: '新着',
                        popular: '人気',
                        classic: '定番',
                        featured: '注目'
                    };
                    return labels[category] || category;
                },

                getCategoryClass(category) {
                    const classes = {
                        new: 'bg-red-100 text-red-700',
                        popular: 'bg-orange-100 text-orange-700',
                        classic: 'bg-green-100 text-green-700',
                        featured: 'bg-purple-100 text-purple-700'
                    };
                    return classes[category] || 'bg-gray-100 text-gray-700';
                },

                getStatusLabel(rented) {
                    return rented ? '貸出中' : '在庫あり';
                },

                getStatusClass(rented) {
                    return rented ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700';
                },

                // 貸出ステータス
                getRentalStatusLabel(status) {
                    const labels = {
                        active: '貸出中',
                        returned: '返済済み'
                    };
                    return labels[status] || status;
                },

                getRentalStatusClass(status) {
                    return status === 'active' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700';
                },

                // 重要度
                getPriorityLabel(priority) {
                    const labels = {
                        normal: '通常',
                        important: '重要',
                        urgent: '緊急'
                    };
                    return labels[priority] || priority;
                },

                getPriorityClass(priority) {
                    const classes = {
                        normal: 'bg-gray-100 text-gray-700',
                        important: 'bg-blue-100 text-blue-700',
                        urgent: 'bg-red-100 text-red-700'
                    };
                    return classes[priority] || 'bg-gray-100 text-gray-700';
                }
            }
        }
    </script>
