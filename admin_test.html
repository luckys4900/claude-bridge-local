<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト｜パチレン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900" x-data="testApp()" x-cloak>
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold">テストページ</h1>
        <p x-text="message"></p>
        <button @click="increment">カウント: <span x-text="count"></span></button>
    </div>

    <script>
        function testApp() {
            return {
                count: 0,
                message: 'Alpine.jsが正常に動作しています',
                increment() {
                    this.count++;
                }
            }
        }
    </script>
</body>
</html>
